name: Build & Deploy User Management Service
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-deploy:
    name: Build and Deploy User Management Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Unit Tests
        run: mvn -B test --file pom.xml

      - name: Build the application
        run: |
          mvn -B clean --file pom.xml
          mvn -B  package --file pom.xml -DskipTests